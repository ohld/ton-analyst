name: Bump version on main

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: bump-version-on-main
  cancel-in-progress: false

jobs:
  bump:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip version bump]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Skip if this push already changed the version
        id: version_changed
        run: |
          before="$(git show HEAD^:skills/ton-analyst/VERSION 2>/dev/null || true)"
          current="$(tr -d '[:space:]' < skills/ton-analyst/VERSION)"
          if [ "$before" != "$current" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version already changed in this push ($before -> $current); skipping auto-bump."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.version_changed.outputs.changed == 'false'
        id: bump
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          version_path = Path("skills/ton-analyst/VERSION")
          current = version_path.read_text().strip()
          parts = current.split(".")
          if len(parts) != 3 or not all(p.isdigit() for p in parts):
              raise SystemExit(f"Unsupported VERSION format: {current}")

          parts[2] = str(int(parts[2]) + 1)
          new = ".".join(parts)
          version_path.write_text(new + "\n")

          marketplace_path = Path(".claude-plugin/marketplace.json")
          marketplace = json.loads(marketplace_path.read_text())
          marketplace["plugins"][0]["version"] = new
          marketplace_path.write_text(json.dumps(marketplace, indent=2) + "\n")

          skill_path = Path("skills/ton-analyst/SKILL.md")
          skill = skill_path.read_text()
          skill = re.sub(r"(?m)^version: .*$", f"version: {new}", skill, count=1)
          skill_path.write_text(skill)

          with open("version.env", "w") as fh:
              fh.write(f"NEW_VERSION={new}\n")
          PY
          cat version.env >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: steps.version_changed.outputs.changed == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json skills/ton-analyst/SKILL.md skills/ton-analyst/VERSION
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          git commit -m "chore: bump ton-analyst version to ${{ steps.bump.outputs.NEW_VERSION }} [skip version bump]"
          git push
