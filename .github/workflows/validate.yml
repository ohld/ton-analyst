name: Validate skill

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Check manifest exists and is valid JSON
        run: |
          echo "Checking marketplace.json..."
          cat .claude-plugin/marketplace.json | python3 -m json.tool > /dev/null
          echo "OK: valid JSON"

      - name: Check required files exist
        run: |
          files=(
            "skills/ton-analyst/SKILL.md"
            "skills/ton-analyst/VERSION"
            "skills/ton-analyst/bin/ton-analyst-bootstrap"
            "skills/ton-analyst/bin/ton-analyst-update-check"
            "skills/ton-analyst/bin/ton-analyst-upgrade"
            "scripts/validate-skill.py"
            "README.md"
            "LICENSE"
            "CHANGELOG.md"
          )
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Check reference files exist
        run: |
          refs=(
            "skills/ton-analyst/reference/dune/query-patterns.md"
            "skills/ton-analyst/reference/dune/patterns/gotchas.md"
            "skills/ton-analyst/reference/dune/patterns/labels-real-users.md"
            "skills/ton-analyst/reference/dune/patterns/address-classification.md"
            "skills/ton-analyst/reference/dune/patterns/nft-fragment.md"
            "skills/ton-analyst/reference/dune/patterns/sql-conventions.md"
            "skills/ton-analyst/reference/dune/patterns/comment-analysis.md"
            "skills/ton-analyst/reference/dune/api.md"
            "skills/ton-analyst/reference/dune/dashboards.md"
            "skills/ton-analyst/reference/dune/schemas/README.md"
            "skills/ton-analyst/reference/dune/schemas/messages.md"
            "skills/ton-analyst/reference/dune/schemas/accounts.md"
            "skills/ton-analyst/reference/dune/examples/README.md"
            "skills/ton-analyst/reference/ton/blockchain.md"
            "skills/ton-analyst/reference/ton/labels.md"
            "skills/ton-analyst/reference/ton/key-addresses.md"
            "skills/ton-analyst/reference/ton/fragment.md"
            "skills/ton-analyst/reference/ton/address-investigation.md"
            "skills/ton-analyst/reference/ton/wallet-investigation.md"
            "skills/ton-analyst/reference/ton/label-submission.md"
            "skills/ton-analyst/reference/ton/api.md"
            "skills/ton-analyst/reference/techniques/cex-flows.md"
            "skills/ton-analyst/reference/techniques/flow-tracing.md"
            "skills/ton-analyst/reference/report-format.md"
            "skills/ton-analyst/reference/update-flow.md"
          )
          for f in "${refs[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Check SQL examples are non-empty
        run: |
          count=0
          for f in skills/ton-analyst/reference/dune/examples/*.sql; do
            if [ ! -s "$f" ]; then
              echo "EMPTY: $f"
              exit 1
            fi
            count=$((count + 1))
            echo "OK: $f ($(wc -l < "$f") lines)"
          done
          echo "Total SQL examples: $count"
          if [ "$count" -lt 1 ]; then
            echo "ERROR: No SQL examples found"
            exit 1
          fi

      - name: Reject generated cache artifacts
        run: |
          if git ls-files | grep -E '(^|/)(__pycache__|\.pytest_cache|\.venv)(/|$)|\.pyc$'; then
            echo "ERROR: generated cache artifacts must not be tracked"
            exit 1
          fi
          echo "OK: no generated cache artifacts tracked"

      - name: Validate version consistency
        run: |
          manifest_ver=$(python3 -c "import json; print(json.load(open('.claude-plugin/marketplace.json'))['plugins'][0]['version'])")
          skill_ver=$(awk -F': *' '/^version:/ {print $2; exit}' skills/ton-analyst/SKILL.md)
          file_ver=$(tr -d '[:space:]' < skills/ton-analyst/VERSION)
          echo "Manifest version: $manifest_ver"
          echo "Skill version:    $skill_ver"
          echo "VERSION file:     $file_ver"
          if [ -z "$manifest_ver" ] || [ -z "$skill_ver" ] || [ -z "$file_ver" ]; then
            echo "ERROR: Missing version"
            exit 1
          fi
          if [ "$manifest_ver" != "$skill_ver" ] || [ "$manifest_ver" != "$file_ver" ]; then
            echo "ERROR: Version mismatch"
            exit 1
          fi
          echo "OK: version $manifest_ver"

      - name: Check update checker
        run: |
          tmp="$(mktemp -d)"
          current_ver=$(tr -d '[:space:]' < skills/ton-analyst/VERSION)
          remote_ver="999.999.999"
          printf '%s\n' "$current_ver" > "$tmp/remote-version"
          out=$(TON_ANALYST_STATE_DIR="$tmp/state" TON_ANALYST_REMOTE_VERSION_URL="file://$tmp/remote-version" skills/ton-analyst/bin/ton-analyst-update-check --force)
          if [ -n "$out" ]; then
            echo "ERROR: expected no output when remote version matches, got: $out"
            exit 1
          fi
          printf '0.0.1\n' > "$tmp/remote-version"
          out=$(TON_ANALYST_STATE_DIR="$tmp/state" TON_ANALYST_REMOTE_VERSION_URL="file://$tmp/remote-version" skills/ton-analyst/bin/ton-analyst-update-check --force)
          if [ -n "$out" ]; then
            echo "ERROR: expected no output when remote version is older, got: $out"
            exit 1
          fi
          printf '%s\n' "$remote_ver" > "$tmp/remote-version"
          out=$(TON_ANALYST_STATE_DIR="$tmp/state" TON_ANALYST_REMOTE_VERSION_URL="file://$tmp/remote-version" skills/ton-analyst/bin/ton-analyst-update-check --force)
          if [ "$out" != "UPDATE_AVAILABLE $current_ver $remote_ver" ]; then
            echo "ERROR: unexpected update output: $out"
            exit 1
          fi
          json_out=$(TON_ANALYST_STATE_DIR="$tmp/state" TON_ANALYST_REMOTE_VERSION_URL="file://$tmp/remote-version" skills/ton-analyst/bin/ton-analyst-update-check --force --json)
          JSON_OUT="$json_out" python3 -c 'import json, os; payload = json.loads(os.environ["JSON_OUT"]); assert payload["status"] == "update_available"; assert payload["update_available"] is True; assert payload["remote_version"] == "999.999.999"'
          replay=$(TON_ANALYST_STATE_DIR="$tmp/state" TON_ANALYST_REMOTE_VERSION_URL="file://$tmp/remote-version" skills/ton-analyst/bin/ton-analyst-update-check)
          if [ "$replay" != "UPDATE_AVAILABLE $current_ver $remote_ver" ]; then
            echo "ERROR: unexpected cached update output: $replay"
            exit 1
          fi
          echo "OK: update checker"

      - name: Check bootstrap auto-update
        run: |
          tmp="$(mktemp -d)"
          git config --global user.name "skill-ci"
          git config --global user.email "skill-ci@example.com"

          git init --bare "$tmp/remote.git"
          git clone "$tmp/remote.git" "$tmp/seed"
          git -C "$tmp/seed" checkout -b main
          mkdir -p "$tmp/seed/skills/ton-analyst/bin"
          cp skills/ton-analyst/bin/ton-analyst-bootstrap "$tmp/seed/skills/ton-analyst/bin/"
          cp skills/ton-analyst/bin/ton-analyst-update-check "$tmp/seed/skills/ton-analyst/bin/"
          cp skills/ton-analyst/bin/ton-analyst-upgrade "$tmp/seed/skills/ton-analyst/bin/"
          printf '1.0.0\n' > "$tmp/seed/skills/ton-analyst/VERSION"
          printf '%s\n' '---' 'name: ton-analyst' 'version: 1.0.0' '---' > "$tmp/seed/skills/ton-analyst/SKILL.md"
          git -C "$tmp/seed" add .
          git -C "$tmp/seed" commit -m "initial"
          git -C "$tmp/seed" push origin main
          git --git-dir="$tmp/remote.git" symbolic-ref HEAD refs/heads/main

          git clone "$tmp/remote.git" "$tmp/install"
          git -C "$tmp/install" checkout main
          git -C "$tmp/install" remote set-url origin https://github.com/ohld/ton-analyst.git
          git -C "$tmp/install" config url."file://$tmp/remote.git".insteadOf https://github.com/ohld/ton-analyst.git

          printf '1.0.1\n' > "$tmp/seed/skills/ton-analyst/VERSION"
          git -C "$tmp/seed" add skills/ton-analyst/VERSION
          git -C "$tmp/seed" commit -m "bump"
          git -C "$tmp/seed" push origin main
          printf '1.0.1\n' > "$tmp/remote-version"

          out=$(TON_ANALYST_SKILL_DIR="$tmp/install/skills/ton-analyst" TON_ANALYST_STATE_DIR="$tmp/state" TON_ANALYST_REMOTE_VERSION_URL="file://$tmp/remote-version" "$tmp/install/skills/ton-analyst/bin/ton-analyst-bootstrap" --force)
          case "$out" in
            UPDATED\ 1.0.0\ 1.0.1\ *) ;;
            *)
              echo "ERROR: expected auto-update, got: $out"
              exit 1
              ;;
          esac
          installed_ver="$(tr -d '[:space:]' < "$tmp/install/skills/ton-analyst/VERSION")"
          if [ "$installed_ver" != "1.0.1" ]; then
            echo "ERROR: expected installed VERSION 1.0.1, got: $installed_ver"
            exit 1
          fi

          printf 'local edit\n' >> "$tmp/install/skills/ton-analyst/SKILL.md"
          printf '1.0.2\n' > "$tmp/seed/skills/ton-analyst/VERSION"
          git -C "$tmp/seed" add skills/ton-analyst/VERSION
          git -C "$tmp/seed" commit -m "bump again"
          git -C "$tmp/seed" push origin main
          printf '1.0.2\n' > "$tmp/remote-version"
          out=$(TON_ANALYST_SKILL_DIR="$tmp/install/skills/ton-analyst" TON_ANALYST_STATE_DIR="$tmp/state" TON_ANALYST_REMOTE_VERSION_URL="file://$tmp/remote-version" "$tmp/install/skills/ton-analyst/bin/ton-analyst-bootstrap" --force)
          case "$out" in
            *AUTO_UPDATE_SKIPPED\ dirty_worktree*) ;;
            *)
              echo "ERROR: expected dirty worktree skip, got: $out"
              exit 1
              ;;
          esac

          git clone --bare "$tmp/remote.git" "$tmp/worktree-host.git"
          git --git-dir="$tmp/worktree-host.git" config remote.origin.url https://github.com/ohld/ton-analyst.git
          git --git-dir="$tmp/worktree-host.git" config url."file://$tmp/remote.git".insteadOf https://github.com/ohld/ton-analyst.git
          git --git-dir="$tmp/worktree-host.git" worktree add "$tmp/worktree-install" main
          test -f "$tmp/worktree-install/.git"

          printf '1.0.3\n' > "$tmp/seed/skills/ton-analyst/VERSION"
          git -C "$tmp/seed" add skills/ton-analyst/VERSION
          git -C "$tmp/seed" commit -m "bump worktree"
          git -C "$tmp/seed" push origin main
          printf '1.0.3\n' > "$tmp/remote-version"
          out=$(TON_ANALYST_SKILL_DIR="$tmp/worktree-install/skills/ton-analyst" TON_ANALYST_STATE_DIR="$tmp/state-worktree" TON_ANALYST_REMOTE_VERSION_URL="file://$tmp/remote-version" "$tmp/worktree-install/skills/ton-analyst/bin/ton-analyst-bootstrap" --force)
          case "$out" in
            UPDATED\ 1.0.2\ 1.0.3\ *) ;;
            *)
              echo "ERROR: expected worktree auto-update, got: $out"
              exit 1
              ;;
          esac

          mkdir -p "$tmp/plain/skills/ton-analyst/bin" "$tmp/plain/skills/ton-analyst/.venv"
          cp skills/ton-analyst/bin/ton-analyst-bootstrap "$tmp/plain/skills/ton-analyst/bin/"
          cp skills/ton-analyst/bin/ton-analyst-update-check "$tmp/plain/skills/ton-analyst/bin/"
          cp skills/ton-analyst/bin/ton-analyst-upgrade "$tmp/plain/skills/ton-analyst/bin/"
          printf '1.0.3\n' > "$tmp/plain/skills/ton-analyst/VERSION"
          printf '%s\n' '---' 'name: ton-analyst' 'version: 1.0.3' '---' > "$tmp/plain/skills/ton-analyst/SKILL.md"
          printf 'stale\n' > "$tmp/plain/skills/ton-analyst/old-only.txt"
          printf 'keep\n' > "$tmp/plain/skills/ton-analyst/.venv/keep.txt"

          printf '1.0.4\n' > "$tmp/seed/skills/ton-analyst/VERSION"
          printf '%s\n' '---' 'name: ton-analyst' 'version: 1.0.4' '---' > "$tmp/seed/skills/ton-analyst/SKILL.md"
          git -C "$tmp/seed" add skills/ton-analyst/VERSION skills/ton-analyst/SKILL.md
          git -C "$tmp/seed" commit -m "bump archive"
          git -C "$tmp/seed" archive --format=tar.gz --prefix=ton-analyst-main/ -o "$tmp/archive.tar.gz" HEAD
          printf '1.0.4\n' > "$tmp/remote-version"
          out=$(TON_ANALYST_SKILL_DIR="$tmp/plain/skills/ton-analyst" TON_ANALYST_STATE_DIR="$tmp/state-archive" TON_ANALYST_REMOTE_VERSION_URL="file://$tmp/remote-version" TON_ANALYST_ARCHIVE_URL="file://$tmp/archive.tar.gz" "$tmp/plain/skills/ton-analyst/bin/ton-analyst-bootstrap" --force)
          case "$out" in
            UPDATED\ 1.0.3\ 1.0.4\ *) ;;
            *)
              echo "ERROR: expected archive auto-update, got: $out"
              exit 1
              ;;
          esac
          archive_ver="$(tr -d '[:space:]' < "$tmp/plain/skills/ton-analyst/VERSION")"
          if [ "$archive_ver" != "1.0.4" ]; then
            echo "ERROR: expected archive VERSION 1.0.4, got: $archive_ver"
            exit 1
          fi
          if [ -e "$tmp/plain/skills/ton-analyst/old-only.txt" ]; then
            echo "ERROR: archive update left stale file"
            exit 1
          fi
          if [ ! -f "$tmp/plain/skills/ton-analyst/.venv/keep.txt" ]; then
            echo "ERROR: archive update did not preserve .venv"
            exit 1
          fi
          if ! find "$tmp/state-archive/backups" -mindepth 1 -maxdepth 1 -type d | grep -q .; then
            echo "ERROR: archive update did not create backup"
            exit 1
          fi
          echo "OK: bootstrap auto-update"

      - name: Check setup script is executable
        run: |
          if [ ! -x "setup" ]; then
            echo "WARNING: setup script is not executable"
            exit 1
          fi
          echo "OK: setup is executable"
          for f in skills/ton-analyst/bin/ton-analyst-bootstrap skills/ton-analyst/bin/ton-analyst-update-check skills/ton-analyst/bin/ton-analyst-upgrade; do
            if [ ! -x "$f" ]; then
              echo "ERROR: $f is not executable"
              exit 1
            fi
            echo "OK: $f is executable"
          done

      - name: Validate skill structure
        run: python3 scripts/validate-skill.py

      - name: Run CLI tests
        working-directory: skills/ton-analyst
        run: uv run pytest
